  <meta name="description" content="Come join our Engineering team!

High velocity, high intensity, high trust, high bar, high impact, and a will to win.

If those words resonate deeply with you, this could be your next career move. We&#39;re seeking someone who leads with humility, pursues audacious goals, and is motivated by meaningful impact on people and the world.

At FutureFit AI, our core mission is to help more people get to better jobs faster and cheaper, with a specific focus on those facing barriers to opportunity. Our work helps resolve the growing issue of economic inequality, ensuring that no one is left behind in the future of work. Our AI-powered platform brings efficiency and insight to workforce development, replacing outdated systems and unlocking human potential at scale.

Ready to make an impact? Apply today.

Important note: Data shows that men typically apply when meeting 3/10 requirements, while women often wait until it&#39;s 10/10. We encourage you to apply if you see a strong (not necessarily perfect) fit.

The Opportunity


YOUR ROLE

You&#39;ll build the product that helps people get to better jobs faster and cheaper, with a focus on those facing the biggest barriers to opportunity. As a full-stack engineer here, you&#39;ll own features end to end, from design through to production, and you&#39;ll have real influence over how we build, not just what. We work with high velocity and a high bar, and we trust engineers to make calls and move.

We&#39;re hiring across the mid to senior range. If you&#39;re mid-level, you&#39;ll grow quickly with meaningful ownership from day one. If you&#39;re senior, you&#39;ll set technical direction, raise the bar on quality, and lift the engineers around you.


WHAT YOU&#39;LL OWN

 - End-to-end delivery: Design, build, test, and ship full-stack features across the frontend and backend, owning your work all the way to production.

 - Product partnership: Work closely with Product, Design, and Data to turn customer needs into well-built, reliable software.

 - Code quality: Write clean, maintainable, well-tested code, and help hold the team to a high bar through reviews and shared standards.

 - Technical judgment: Make sound technical decisions in your work and weigh tradeoffs as you build. At the senior end, this scales up to system design for larger initiatives, architectural calls, and mentoring other engineers.

Your 30/60/90 Day Plan

This role is hands-on and high-impact from week one. You won&#39;t sit on the sidelines learning for a quarter. You&#39;ll be shipping early and owning more as you go. Here&#39;s roughly what that looks like:


BY 30 DAYS: GET ORIENTED AND SHIP

Get your environment set up and ship your first change to production in the first week: a real fix or small improvement, not a throwaway task

Build relationships across Engineering, Product, Design, and Data, and learn how work moves from idea to production here

Get to know the codebase and our stack (React/TypeScript, Node.js, PostgreSQL/MongoDB, AWS), and where the rough edges are

Understand who our users are, the barriers they face, and the problems we&#39;re solving for them


BY 60 DAYS: OWN YOUR WORK END TO END

Take a feature from design through to production on your own, owning quality the whole way

Become a dependable code reviewer and start holding the team to a high bar through shared standards

Develop real judgment about our patterns and tradeoffs, and bring that into planning and technical discussions

Partner closely with Product and Design to turn customer needs into reliable, well-built software


BY 90 DAYS: DRIVE IMPACT

Deliver a meaningful piece of product that customers actually feel

Spot something that slows us down, like tooling, testing, observability, or process, and improve it without being asked

Have a clear point of view on where we can move faster or raise the bar on quality

(At the senior end) take on system design for a larger initiative, make sound architectural calls, and lift the engineers around you




What You Bring - Experiences, Skills, Education


REQUIRED EXPERIENCE

 - Strong full-stack experience building and shipping production web applications (roughly 3+ years for mid-level, 6+ for senior)

 - Deep fluency in TypeScript across the stack, owning both frontend and backend

 - Solid fundamentals in data modeling, API design, and deploying to the cloud

 - A bias to ship: you break work into deliverable pieces and move it to done without hand-holding

 - Clear communication and genuine care for the people who use what you build


BONUS POINTS

 - Experience at an early-stage or fast-scaling startup where you wore several hats

 - Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features

 - Interest in workforce development, economic mobility, or other mission-driven work


OUR TECH STACK FOR ENGINEERING

 - Frontend: React, TypeScript

 - Backend: Node.js, TypeScript

 - Data storage: PostgreSQL, MongoDB

 - Infrastructure: AWS ecosystem

 - Collaboration: Slack, Jira, Figma


YOUR EDUCATION

Your alma mater isn&#39;t our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you&#39;re our person.

The Logistics - Location, Compensation


LOCATION

[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.


TRAVEL EXPECTATIONS

Although this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.


COMPENSATION

The base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.

The Hiring Journey


HIRING JOURNEY

At FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.

Each journey includes a mix of interviews and a performance challenge. For this role, that might look like:

 1. Online Application

 2. Initial Screen with Director of People &amp; Culture

 3. Interview with Hiring Manager

 4. Coding Challenge

 5. Design Challenge

 6. Final 1:1 Interviews

 7. Final Decision

Generally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances.


READY TO SHAPE THE FUTURE OF WORK?

At FutureFit AI, we&#39;re not just building a company—we&#39;re transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.


COMPANY SNAPSHOT:

 - Team: 30-50 across US and Canada (hubs in NYC and Toronto)

 - Customers: Workforce development agencies and intermediaries, government agencies, employers

 - Industry: SaaS/AI technology

 - Funding: Bootstrapped 0-1, then raised funding led by JP Morgan

 - Structure: Growth, Customer Success, Product, Engineering, Data, People &amp; Culture, Finance &amp; Operations


OUR CORE PRINCIPLES

 - Be Curious

 - Drive to Outcomes

 - Raise the Bar

 - Speed Matters

 - Own It

 - We Over Me


USE OF AI IN HIRING

At FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:

 - Screening support: AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input.

 - Interview support: In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.

 - Insights, not decisions: AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.

We will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.

© FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply." />

\"min-height:1.5em\">At FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.</p><p style=\"min-height:1.5em\"></p><h2><strong>Company Snapshot:</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Team: </strong>30-50 across US and Canada (hubs in NYC and Toronto)</p></li><li><p style=\"min-height:1.5em\"><strong>Customers: </strong>Workforce development agencies and intermediaries, government agencies, employers</p></li><li><p style=\"min-height:1.5em\"><strong>Industry:</strong> SaaS/AI technology</p></li><li><p style=\"min-height:1.5em\"><strong>Funding:</strong> Bootstrapped 0-1, then raised funding led by JP Morgan</p></li><li><p style=\"min-height:1.5em\"><strong>Structure: </strong>Growth, Customer Success, Product, Engineering, Data, People &amp; Culture, Finance &amp; Operations</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Our Core Principles</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Be Curious</p></li><li><p style=\"min-height:1.5em\">Drive to Outcomes</p></li><li><p style=\"min-height:1.5em\">Raise the Bar</p></li><li><p style=\"min-height:1.5em\">Speed Matters</p></li><li><p style=\"min-height:1.5em\">Own It</p></li><li><p style=\"min-height:1.5em\">We Over Me</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Use of AI in Hiring</strong></h2><p style=\"min-height:1.5em\">At FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Screening support:</strong> AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input. </p></li><li><p style=\"min-height:1.5em\"><strong>Interview support:</strong> In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.</p></li><li><p style=\"min-height:1.5em\"><strong>Insights, not decisions:</strong> AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>We will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.</em><br /><br /><em><strong>© </strong>FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply.</em></p>","directApply":true,"identifier":{"@type":"PropertyValue","name":"FutureFit AI","value":"df12191c-3c81-4750-9a17-4e6f94181599"},"datePosted":"2026-06-09","hiringOrganization":{"@type":"Organization","name":"FutureFit AI","sameAs":"https://www.futurefit.ai/","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/82aa54ac-fee0-4012-8043-b3a97a387c09/efb01fd6-cfcf-474e-a1e8-1e8656f09721/c041b70f-4694-4f92-a6f2-60673934d837.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress"}},"employmentType":"FULL_TIME"}</script>

ry","OfferFieldsOnEmployeeReports"],"allowJobPostIndexing":true,"isDemoOrg":false,"theme":{"colors":{"version":"1","colorPrimary600":"#6C00F2","colorPrimary900":"#030038"},"showJobFilters":true,"showLocationAddress":false,"showTeams":false,"showAutofillApplicationsBox":true,"logoWordmarkImageUrl":"https://app.ashbyhq.com/api/images/org-theme-wordmark/82aa54ac-fee0-4012-8043-b3a97a387c09/efb01fd6-cfcf-474e-a1e8-1e8656f09721/37550234-1494-4e3d-b220-0c936415b23f.png","logoSquareImageUrl":"https://app.ashbyhq.com/api/images/org-theme-logo/82aa54ac-fee0-4012-8043-b3a97a387c09/efb01fd6-cfcf-474e-a1e8-1e8656f09721/c041b70f-4694-4f92-a6f2-60673934d837.png","applicationSubmittedSuccessMessage":null,"jobBoardTopDescriptionHtml":"<h1><strong>About FutureFit AI</strong></h1><p style=\"min-height:1.5em\">At FutureFit AI, we’re on a mission to unlock pathways between talent and opportunity using the power of AI. We partner with workforce development organizations, government, and enterprises to provide job seekers with an AI-powered tool that acts as a “GPS for your Career.” </p><p style=\"min-height:1.5em\">FutureFit AI is a growing, venture-backed company focused on using technology to improve the lives and outcomes for people going through career transitions. We’re a small, driven team, united by our commitment to the job seekers and workforce ecosystems we serve. We're not just building a company; we're shaping the future of work.</p>","jobBoardBottomDescriptionHtml":null,"jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"recruitingPrivacyPolicyUrl":null,"timezone":"America/New_York","candidateScheduleCancellationReasonRequirementStatus":"Off","showCookieBanner":false},"posting":{"id":"df12191c-3c81-4750-9a17-4e6f94181599","title":"Software Engineer","updatedAt":"2026-06-09T20:37:46.709Z","departmentName":"Engineering","departmentExternalName":"Engineering","teamName":"Engineering","teamExternalName":"Engineering","teamNames":["Engineering"],"locationName":"Remote (North America)","locationExternalName":"Remote (North America)","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>Come join our Engineering team!</strong></p><p style=\"min-height:1.5em\"><strong>High velocity, high intensity, high trust, high bar, high impact, and a will to win.</strong></p><p style=\"min-height:1.5em\">If those words resonate deeply with you, this could be your next career move. We're seeking someone who leads with humility, pursues audacious goals, and is motivated by meaningful impact on people and the world.</p><p style=\"min-height:1.5em\">At FutureFit AI, our core mission is to help more people get to better jobs faster and cheaper, with a specific focus on those facing barriers to opportunity. Our work helps resolve the growing issue of economic inequality, ensuring that no one is left behind in the future of work. Our AI-powered platform brings efficiency and insight to workforce development, replacing outdated systems and unlocking human potential at scale.</p><p style=\"min-height:1.5em\">Ready to make an impact? Apply today.</p><p style=\"min-height:1.5em\"><em>Important note: Data shows that men typically apply when meeting 3/10 requirements, while women often wait until it's 10/10. We encourage you to apply if you see a strong (not necessarily perfect) fit.</em></p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Opportunity</strong></p><h2><strong>Your Role</strong></h2><p style=\"min-height:1.5em\">You'll build the product that helps people get to better jobs faster and cheaper, with a focus on those facing the biggest barriers to opportunity. As a full-stack engineer here, you'll own features end to end, from design through to production, and you'll have real influence over how we build, not just what. We work with high velocity and a high bar, and we trust engineers to make calls and move.</p><p style=\"min-height:1.5em\">We're hiring across the mid to senior range. If you're mid-level, you'll grow quickly with meaningful ownership from day one. If you're senior, you'll set technical direction, raise the bar on quality, and lift the engineers around you.</p><h2><strong>What You'll Own</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>End-to-end delivery:</strong> Design, build, test, and ship full-stack features across the frontend and backend, owning your work all the way to production.</p></li><li><p style=\"min-height:1.5em\"><strong>Product partnership:</strong> Work closely with Product, Design, and Data to turn customer needs into well-built, reliable software.</p></li><li><p style=\"min-height:1.5em\"><strong>Code quality:</strong> Write clean, maintainable, well-tested code, and help hold the team to a high bar through reviews and shared standards.</p></li><li><p style=\"min-height:1.5em\"><strong>Technical judgment:</strong> Make sound technical decisions in your work and weigh tradeoffs as you build. At the senior end, this scales up to system design for larger initiatives, architectural calls, and mentoring other engineers.</p></li></ul><p style=\"min-height:1.5em\"><strong>Your 30/60/90 Day Plan</strong></p><p style=\"min-height:1.5em\">This role is hands-on and high-impact from week one. You won't sit on the sidelines learning for a quarter. You'll be shipping early and owning more as you go. Here's roughly what that looks like:</p><h2>By 30 days: Get oriented and ship</h2><p style=\"min-height:1.5em\">Get your environment set up and ship your first change to production in the first week: a real fix or small improvement, not a throwaway task</p><p style=\"min-height:1.5em\">Build relationships across Engineering, Product, Design, and Data, and learn how work moves from idea to production here</p><p style=\"min-height:1.5em\">Get to know the codebase and our stack (React/TypeScript, Node.js, PostgreSQL/MongoDB, AWS), and where the rough edges are</p><p style=\"min-height:1.5em\">Understand who our users are, the barriers they face, and the problems we're solving for them</p><p style=\"min-height:1.5em\"></p><h2>By 60 days: Own your work end to end</h2><p style=\"min-height:1.5em\">Take a feature from design through to production on your own, owning quality the whole way</p><p style=\"min-height:1.5em\">Become a dependable code reviewer and start holding the team to a high bar through shared standards</p><p style=\"min-height:1.5em\">Develop real judgment about our patterns and tradeoffs, and bring that into planning and technical discussions</p><p style=\"min-height:1.5em\">Partner closely with Product and Design to turn customer needs into reliable, well-built software</p><p style=\"min-height:1.5em\"></p><h2>By 90 days: Drive impact</h2><p style=\"min-height:1.5em\">Deliver a meaningful piece of product that customers actually feel</p><p style=\"min-height:1.5em\">Spot something that slows us down, like tooling, testing, observability, or process, and improve it without being asked</p><p style=\"min-height:1.5em\">Have a clear point of view on where we can move faster or raise the bar on quality</p><p style=\"min-height:1.5em\">(At the senior end) take on system design for a larger initiative, make sound architectural calls, and lift the engineers around you</p><p style=\"min-height:1.5em\"><br /></p><p style=\"min-height:1.5em\"><strong>What You Bring - Experiences, Skills, Education</strong></p><h2><strong>Required Experience</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong full-stack experience building and shipping production web applications (roughly 3+ years for mid-level, 6+ for senior)</p></li><li><p style=\"min-height:1.5em\">Deep fluency in TypeScript across the stack, owning both frontend and backend</p></li><li><p style=\"min-height:1.5em\">Solid fundamentals in data modeling, API design, and deploying to the cloud</p></li><li><p style=\"min-height:1.5em\">A bias to ship: you break work into deliverable pieces and move it to done without hand-holding</p></li><li><p style=\"min-height:1.5em\">Clear communication and genuine care for the people who use what you build</p></li></ul><h2><strong>Bonus Points</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience at an early-stage or fast-scaling startup where you wore several hats</p></li><li><p style=\"min-height:1.5em\">Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features</p></li><li><p style=\"min-height:1.5em\">Interest in workforce development, economic mobility, or other mission-driven work</p></li></ul><h2><strong>Our Tech Stack for Engineering</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Frontend: </strong>React, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Backend: </strong>Node.js, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Data storage: </strong>PostgreSQL, MongoDB</p></li><li><p style=\"min-height:1.5em\"><strong>Infrastructure: </strong>AWS ecosystem</p></li><li><p style=\"min-height:1.5em\"><strong>Collaboration: </strong>Slack, Jira, Figma</p></li></ul><h2><strong>Your Education</strong></h2><p style=\"min-height:1.5em\">Your alma mater isn't our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you're our person.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Logistics - Location, Compensation</strong></p><h2><strong>Location</strong></h2><p style=\"min-height:1.5em\">[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.</p><h2><strong>Travel Expectations</strong></h2><p style=\"min-height:1.5em\">Although this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.</p><h2><strong>Compensation</strong></h2><p style=\"min-height:1.5em\">The base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Hiring Journey</strong></p><h2><strong>Hiring Journey</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.</p><p style=\"min-height:1.5em\">Each journey includes a mix of interviews and a performance challenge. For this role, that might look like:</p><ol style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Online Application</p></li><li><p style=\"min-height:1.5em\">Initial Screen with Director of People &amp; Culture</p></li><li><p style=\"min-height:1.5em\">Interview with Hiring Manager</p></li><li><p style=\"min-height:1.5em\">Coding Challenge</p></li><li><p style=\"min-height:1.5em\">Design Challenge</p></li><li><p style=\"min-height:1.5em\">Final 1:1 Interviews</p></li><li><p style=\"min-height:1.5em\">Final Decision</p></li></ol><p style=\"min-height:1.5em\"><em>Generally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances.</em></p><p style=\"min-height:1.5em\"></p><h2><strong>Ready to shape the future of work?</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.</p><p style=\"min-height:1.5em\"></p><h2><strong>Company Snapshot:</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Team: </strong>30-50 across US and Canada (hubs in NYC and Toronto)</p></li><li><p style=\"min-height:1.5em\"><strong>Customers: </strong>Workforce development agencies and intermediaries, government agencies, employers</p></li><li><p style=\"min-height:1.5em\"><strong>Industry:</strong> SaaS/AI technology</p></li><li><p style=\"min-height:1.5em\"><strong>Funding:</strong> Bootstrapped 0-1, then raised funding led by JP Morgan</p></li><li><p style=\"min-height:1.5em\"><strong>Structure: </strong>Growth, Customer Success, Product, Engineering, Data, People &amp; Culture, Finance &amp; Operations</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Our Core Principles</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Be Curious</p></li><li><p style=\"min-height:1.5em\">Drive to Outcomes</p></li><li><p style=\"min-height:1.5em\">Raise the Bar</p></li><li><p style=\"min-height:1.5em\">Speed Matters</p></li><li><p style=\"min-height:1.5em\">Own It</p></li><li><p style=\"min-height:1.5em\">We Over Me</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Use of AI in Hiring</strong></h2><p style=\"min-height:1.5em\">At FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Screening support:</strong> AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input. </p></li><li><p style=\"min-height:1.5em\"><strong>Interview support:</strong> In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.</p></li><li><p style=\"min-height:1.5em\"><strong>Insights, not decisions:</strong> AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>We will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.</em><br /><br /><em><strong>© </strong>FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply.</em></p>","descriptionPlainText":"Come join our Engineering team!\n\nHigh velocity, high intensity, high trust, high bar, high impact, and a will to win.\n\nIf those words resonate deeply with you, this could be your next career move. We're seeking someone who leads with humility, pursues audacious goals, and is motivated by meaningful impact on people and the world.\n\nAt FutureFit AI, our core mission is to help more people get to better jobs faster and cheaper, with a specific focus on those facing barriers to opportunity. Our work helps resolve the growing issue of economic inequality, ensuring that no one is left behind in the future of work. Our AI-powered platform brings efficiency and insight to workforce development, replacing outdated systems and unlocking human potential at scale.\n\nReady to make an impact? Apply today.\n\nImportant note: Data shows that men typically apply when meeting 3/10 requirements, while women often wait until it's 10/10. We encourage you to apply if you see a strong (not necessarily perfect) fit.\n\nThe Opportunity\n\n\nYOUR ROLE\n\nYou'll build the product that helps people get to better jobs faster and cheaper, with a focus on those facing the biggest barriers to opportunity. As a full-stack engineer here, you'll own features end to end, from design through to production, and you'll have real influence over how we build, not just what. We work with high velocity and a high bar, and we trust engineers to make calls and move.\n\nWe're hiring across the mid to senior range. If you're mid-level, you'll grow quickly with meaningful ownership from day one. If you're senior, you'll set technical direction, raise the bar on quality, and lift the engineers around you.\n\n\nWHAT YOU'LL OWN\n\n - End-to-end delivery: Design, build, test, and ship full-stack features across the frontend and backend, owning your work all the way to production.\n\n - Product partnership: Work closely with Product, Design, and Data to turn customer needs into well-built, reliable software.\n\n - Code quality: Write clean, maintainable, well-tested code, and help hold the team to a high bar through reviews and shared standards.\n\n - Technical judgment: Make sound technical decisions in your work and weigh tradeoffs as you build. At the senior end, this scales up to system design for larger initiatives, architectural calls, and mentoring other engineers.\n\nYour 30/60/90 Day Plan\n\nThis role is hands-on and high-impact from week one. You won't sit on the sidelines learning for a quarter. You'll be shipping early and owning more as you go. Here's roughly what that looks like:\n\n\nBY 30 DAYS: GET ORIENTED AND SHIP\n\nGet your environment set up and ship your first change to production in the first week: a real fix or small improvement, not a throwaway task\n\nBuild relationships across Engineering, Product, Design, and Data, and learn how work moves from idea to production here\n\nGet to know the codebase and our stack (React/TypeScript, Node.js, PostgreSQL/MongoDB, AWS), and where the rough edges are\n\nUnderstand who our users are, the barriers they face, and the problems we're solving for them\n\n\nBY 60 DAYS: OWN YOUR WORK END TO END\n\nTake a feature from design through to production on your own, owning quality the whole way\n\nBecome a dependable code reviewer and start holding the team to a high bar through shared standards\n\nDevelop real judgment about our patterns and tradeoffs, and bring that into planning and technical discussions\n\nPartner closely with Product and Design to turn customer needs into reliable, well-built software\n\n\nBY 90 DAYS: DRIVE IMPACT\n\nDeliver a meaningful piece of product that customers actually feel\n\nSpot something that slows us down, like tooling, testing, observability, or process, and improve it without being asked\n\nHave a clear point of view on where we can move faster or raise the bar on quality\n\n(At the senior end) take on system design for a larger initiative, make sound architectural calls, and lift the engineers around you\n\n\n\n\nWhat You Bring - Experiences, Skills, Education\n\n\nREQUIRED EXPERIENCE\n\n - Strong full-stack experience building and shipping production web applications (roughly 3+ years for mid-level, 6+ for senior)\n\n - Deep fluency in TypeScript across the stack, owning both frontend and backend\n\n - Solid fundamentals in data modeling, API design, and deploying to the cloud\n\n - A bias to ship: you break work into deliverable pieces and move it to done without hand-holding\n\n - Clear communication and genuine care for the people who use what you build\n\n\nBONUS POINTS\n\n - Experience at an early-stage or fast-scaling startup where you wore several hats\n\n - Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features\n\n - Interest in workforce development, economic mobility, or other mission-driven work\n\n\nOUR TECH STACK FOR ENGINEERING\n\n - Frontend: React, TypeScript\n\n - Backend: Node.js, TypeScript\n\n - Data storage: PostgreSQL, MongoDB\n\n - Infrastructure: AWS ecosystem\n\n - Collaboration: Slack, Jira, Figma\n\n\nYOUR EDUCATION\n\nYour alma mater isn't our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you're our person.\n\nThe Logistics - Location, Compensation\n\n\nLOCATION\n\n[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.\n\n\nTRAVEL EXPECTATIONS\n\nAlthough this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.\n\n\nCOMPENSATION\n\nThe base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.\n\nThe Hiring Journey\n\n\nHIRING JOURNEY\n\nAt FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.\n\nEach journey includes a mix of interviews and a performance challenge. For this role, that might look like:\n\n 1. Online Application\n\n 2. Initial Screen with Director of People & Culture\n\n 3. Interview with Hiring Manager\n\n 4. Coding Challenge\n\n 5. Design Challenge\n\n 6. Final 1:1 Interviews\n\n 7. Final Decision\n\nGenerally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances.\n\n\nREADY TO SHAPE THE FUTURE OF WORK?\n\nAt FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.\n\n\nCOMPANY SNAPSHOT:\n\n - Team: 30-50 across US and Canada (hubs in NYC and Toronto)\n\n - Customers: Workforce development agencies and intermediaries, government agencies, employers\n\n - Industry: SaaS/AI technology\n\n - Funding: Bootstrapped 0-1, then raised funding led by JP Morgan\n\n - Structure: Growth, Customer Success, Product, Engineering, Data, People & Culture, Finance & Operations\n\n\nOUR CORE PRINCIPLES\n\n - Be Curious\n\n - Drive to Outcomes\n\n - Raise the Bar\n\n - Speed Matters\n\n - Own It\n\n - We Over Me\n\n\nUSE OF AI IN HIRING\n\nAt FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:\n\n - Screening support: AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input.\n\n - Interview support: In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.\n\n - Insights, not decisions: AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.\n\nWe will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.\n\n© FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply.","descriptionParts":{"descriptionOpening":null,"descriptionBody":{"html":"<p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>Come join our Engineering team!</strong></p><p style=\"min-height:1.5em\"><strong>High velocity, high intensity, high trust, high bar, high impact, and a will to win.</strong></p><p style=\"min-height:1.5em\">If those words resonate deeply with you, this could be your next career move. We're seeking someone who leads with humility, pursues audacious goals, and is motivated by meaningful impact on people and the world.</p><p style=\"min-height:1.5em\">At FutureFit AI, our core mission is to help more people get to better jobs faster and cheaper, with a specific focus on those facing barriers to opportunity. Our work helps resolve the growing issue of economic inequality, ensuring that no one is left behind in the future of work. Our AI-powered platform brings efficiency and insight to workforce development, replacing outdated systems and unlocking human potential at scale.</p><p style=\"min-height:1.5em\">Ready to make an impact? Apply today.</p><p style=\"min-height:1.5em\"><em>Important note: Data 5em\">(At the senior end) take on system design for a larger initiative, make sound architectural calls, and lift the engineers around you</p><p style=\"min-height:1.5em\"><br /></p><p style=\"min-height:1.5em\"><strong>What You Bring - Experiences, Skills, Education</strong></p><h2><strong>Required Experience</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong full-stack experience building and shipping production web applications (roughly 3+ years for mid-level, 6+ for senior)</p></li><li><p style=\"min-height:1.5em\">Deep fluency in TypeScript across the stack, owning both frontend and backend</p></li><li><p style=\"min-height:1.5em\">Solid fundamentals in data modeling, API design, and deploying to the cloud</p></li><li><p style=\"min-height:1.5em\">A bias to ship: you break work into deliverable pieces and move it to done without hand-holding</p></li><li><p style=\"min-height:1.5em\">Clear communication and genuine care for the people who use what you build</p></li></ul><h2><strong>Bonus Points</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience at an early-stage or fast-scaling startup where you wore several hats</p></li><li><p style=\"min-height:1.5em\">Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features</p></li><li><p style=\"min-height:1.5em\">Interest in workforce development, economic mobility, or other mission-driven work</p></li></ul><h2><strong>Our Tech Stack for Engineering</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Frontend: </strong>React, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Backend: </strong>Node.js, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Data storage: </strong>PostgreSQL, MongoDB</p></li><li><p style=\"min-height:1.5em\"><strong>Infrastructure: </strong>AWS ecosystem</p></li><li><p style=\"min-height:1.5em\"><strong>Collaboration: </strong>Slack, Jira, Figma</p></li></ul><h2><strong>Your Education</strong></h2><p style=\"min-height:1.5em\">Your alma mater isn't our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you're our person.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Logistics - Location, Compensation</strong></p><h2><strong>Location</strong></h2><p style=\"min-height:1.5em\">[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.</p><h2><strong>Travel Expectations</strong></h2><p style=\"min-height:1.5em\">Although this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.</p><h2><strong>Compensation</strong></h2><p style=\"min-height:1.5em\">The base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Hiring Journey</strong></p><h2><strong>Hiring Journey</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.</p><p style=\"min-height:1.5em\">Each journey includes a mix of interviews and a performance challenge. For this role, that might look like:</p><ol style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Online Application</p></li><li><p style=\"min-height:1.5em\">Initial Screen with Director of People &amp; Culture</p></li><li><p style=\"min-height:1.5em\">Interview with Hiring Manager</p></li><li><p style=\"min-height:1.5em\">Coding Challenge</p></li><li><p style=\"min-height:1.5em\">Design Challenge</p></li><li><p style=\"min-height:1.5em\">Final 1:1 Interviews</p></li><li><p style=\"min-height:1.5em\">Final Decision</p></li></ol><p style=\"min-height:1.5em\"><em>Generally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances.</em></p>","plain":"Come join our Engineering team!\n\nHigh velocity, high intensity, high trust, high bar, high impact, and a will to win.\n\nIf those words resonate deeply with you, this could be your next career move. We're seeking someone who leads with humility, pursues audacious goals, and is motivated by meaningful impact on people and the world.\n\nAt FutureFit AI, our core mission is to help more people get to better jobs faster and cheaper, with a specific focus on those facing barriers to opportunity. Our work helps resolve the growing issue of economic inequality, ensuring that no one is left behind in the future of work. Our AI-powered platform brings efficiency and insight to workforce development, replacing outdated systems and unlocking human potential at scale.\n\nReady to make an impact? Apply today.\n\nImportant note: Data shows that men typically apply when meeting 3/10 requirements, while women often wait until it's 10/10. We encourage you to apply if you see a strong (not necessarily perfect) fit.\n\nThe Opportunity\n\n\nYOUR ROLE\n\nYou'll build the product that helps people get to better jobs faster and cheaper, with a focus on those facing the biggest barriers to opportunity. As a full-stack engineer here, you'll own features end to end, from design through to production, and you'll have real influence over how we build, not just what. We work with high velocity and a high bar, and we trust engineers to make calls and move.\n\nWe're hiring across the mid to senior range. If you're mid-level, you'll grow quickly with meaningful ownership from day one. If you're senior, you'll set technical direction, raise the bar on quality, and lift the engineers around you.\n\n\nWHAT YOU'LL OWN\n\n - End-to-end delivery: Design, build, test, and ship full-stack features across the frontend and backend, owning your work all the way to production.\n\n - Product partnership: Work closely with Product, Design, and Data to turn customer needs into well-built, reliable software.\n\n - Code quality: Write clean, maintainable, well-tested code, and help hold the team to a high bar through reviews and shared standards.\n\n - Technical judgment: Make sound technical decisions in your work and weigh tradeoffs as you build. At the senior end, this scales up to system design for larger initiatives, architectural calls, and mentoring other engineers.\n\nYour 30/60/90 Day Plan\n\nThis role is hands-on and high-impact from week one. You won't sit on the sidelines learning for a quarter. You'll be shipping early and owning more as you go. Here's roughly what that looks like:\n\n\nBY 30 DAYS: GET ORIENTED AND SHIP\n\nGet your environment set up and ship your first change to production in the first week: a real fix or small improvement, not a throwaway task\n\nBuild relationships across Engineering, Product, Design, and Data, and learn how work moves from idea to production here\n\nGet to know the codebase and our stack (React/TypeScript, Node.js, PostgreSQL/MongoDB, AWS), and where the rough edges are\n\nUnderstand who our users are, the barriers they face, and the problems we're solving for them\n\n\nBY 60 DAYS: OWN YOUR WORK END TO END\n\nTake a feature from design through to production on your own, owning quality the whole way\n\nBecome a dependable code reviewer and start holding the team to a high bar through shared standards\n\nDevelop real judgment about our patterns and tradeoffs, and bring that into planning and technical discussions\n\nPartner closely with Product and Design to turn customer needs into reliable, well-built software\n\n\nBY 90 DAYS: DRIVE IMPACT\n\nDeliver a meaningful piece of product that customers actually feel\n\nSpot something that slows us down, like tooling, testing, observability, or process, and improve it without being asked\n\nHave a clear point of view on where we can move faster or raise the bar on quality\n\n(At the senior end) take on system design for a larger initiative, make sound architectural calls, and lift the engineers around you\n\n\n\n\nWhat You Bring - Experiences, Skills, Education\n\n\nREQUIRED EXPERIENCE\n\n - Strong full-stack experience building and shipping production web applications (roughly 3+ years for mid-level, 6+ for senior)\n\n - Deep fluency in TypeScript across the stack, owning both frontend and backend\n\n - Solid fundamentals in data modeling, API design, and deploying to the cloud\n\n - A bias to ship: you break work into deliverable pieces and move it to done without hand-holding\n\n - Clear communication and genuine care for the people who use what you build\n\n\nBONUS POINTS\n\n - Experience at an early-stage or fast-scaling startup where you wore several hats\n\n - Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features\n\n - Interest in workforce development, economic mobility, or other mission-driven work\n\n\nOUR TECH STACK FOR ENGINEERING\n\n - Frontend: React, TypeScript\n\n - Backend: Node.js, TypeScript\n\n - Data storage: PostgreSQL, MongoDB\n\n - Infrastructure: AWS ecosystem\n\n - Collaboration: Slack, Jira, Figma\n\n\nYOUR EDUCATION\n\nYour alma mater isn't our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you're our person.\n\nThe Logistics - Location, Compensation\n\n\nLOCATION\n\n[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.\n\n\nTRAVEL EXPECTATIONS\n\nAlthough this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.\n\n\nCOMPENSATION\n\nThe base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.\n\nThe Hiring Journey\n\n\nHIRING JOURNEY\n\nAt FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.\n\nEach journey includes a mix of interviews and a performance challenge. For this role, that might look like:\n\n 1. Online Application\n\n 2. Initial Screen with Director of People & Culture\n\n 3. Interview with Hiring Manager\n\n 4. Coding Challenge\n\n 5. Design Challenge\n\n 6. Final 1:1 Interviews\n\n 7. Final Decision\n\nGenerally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances."},"descriptionClosing":{"html":"<p style=\"min-height:1.5em\"></p><h2><strong>Ready to shape the future of work?</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.</p><p style=\"min-height:1.5em\"></p><h2><strong>Company Snapshot:</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Team: </strong>30-50 across US and Canada (hubs in NYC and Toronto)</p></li><li><p style=\"min-height:1.5em\"><strong>Customers: </strong>Workforce development agencies and intermediaries, government agencies, employers</p></li><li><p style=\"min-height:1.5em\"><strong>Industry:</strong> SaaS/AI technology</p></li><li><p style=\"min-height:1.5em\"><strong>Funding:</strong> Bootstrapped 0-1, then raised funding led by JP Morgan</p></li><li><p style=\"min-height:1.5em\"><strong>Structure: </strong>Growth, Customer Success, Product, Engineering, Data, People &amp; Culture, Finance &amp; Operations</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Our Core Principles</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Be Curious</p></li><li><p style=\"min-height:1.5em\">Drive to Outcomes</p></li><li><p style=\"min-height:1.5em\">Raise the Bar</p></li><li><p style=\"min-height:1.5em\">Speed Matters</p></li><li><p style=\"min-height:1.5em\">Own It</p></li><li><p style=\"min-height:1.5em\">We Over Me</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Use of AI in Hiring</strong></h2><p style=\"min-height:1.5em\">At FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Screening support:</strong> AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input. </p></li><li><p style=\"min-height:1.5em\"><strong>Interview support:</strong> In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.</p></li><li><p style=\"min-height:1.5em\"><strong>Insights, not decisions:</strong> AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>We will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.</em><br /><br /><em><strong>© </strong>FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply.</em></p>","plain":"READY TO SHAPE THE FUTURE OF WORK?\n\nAt FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.\n\n\nCOMPANY SNAPSHOT:\n\n - Team: 30-50 across US and Canada (hubs in NYC and Toronto)\n\n - Customers: Workforce development agencies and intermediaries, government agencies, employers\n\n - Industry: SaaS/AI technology\n\n - Funding: Bootstrapped 0-1, then raised funding led by JP Morgan\n\n - Structure: Growth, Customer Success, Product, Engineering, Data, People & Culture, Finance & Operations\n\n\nOUR CORE PRINCIPLES\n\n - Be Curious\n\n - Drive to Outcomes\n\n - Raise the Bar\n\n - Speed Matters\n\n - Own It\n\n - We Over Me\n\n\nUSE OF AI IN HIRING\n\nAt FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:\n\n - Screening support: AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input.\n\n - Interview support: In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.\n\n - Insights, not decisions: AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.\n\nWe will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.\n\n© FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply."}},"shortDescription":null,"applicationFormDefinitionId":"68f6e5fc-61e5-4b34-aaa2-0c6cbaeae17b","surveyFormDefinitionIds":[],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Software Engineer","description":"<p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>Come join our Engineering team!</strong></p><p style=\"min-height:1.5em\"><strong>High vel -height:1.5em\"><li><p style=\"min-height:1.5em\">Experience at an early-stage or fast-scaling startup where you wore several hats</p></li><li><p style=\"min-height:1.5em\">Exposure to data-intensive products, recommendation/matching systems, or AI/ML-backed features</p></li><li><p style=\"min-height:1.5em\">Interest in workforce development, economic mobility, or other mission-driven work</p></li></ul><h2><strong>Our Tech Stack for Engineering</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Frontend: </strong>React, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Backend: </strong>Node.js, TypeScript</p></li><li><p style=\"min-height:1.5em\"><strong>Data storage: </strong>PostgreSQL, MongoDB</p></li><li><p style=\"min-height:1.5em\"><strong>Infrastructure: </strong>AWS ecosystem</p></li><li><p style=\"min-height:1.5em\"><strong>Collaboration: </strong>Slack, Jira, Figma</p></li></ul><h2><strong>Your Education</strong></h2><p style=\"min-height:1.5em\">Your alma mater isn't our focus. Your grit, hunger, and drive are. If you learn continuously, tackle challenges head-on, and know your strengths and gaps intimately, you're our person.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Logistics - Location, Compensation</strong></p><h2><strong>Location</strong></h2><p style=\"min-height:1.5em\">[CA/US Remote] We are open to candidates living anywhere in Canada or the US. For candidates living in Toronto, our office is conveniently located at 325 Front St West (a short walk from Union Station). You are welcome to come in on a hybrid schedule.</p><h2><strong>Travel Expectations</strong></h2><p style=\"min-height:1.5em\">Although this role is remote, you may be expected to travel up to once per quarter for offsites and team gatherings.</p><h2><strong>Compensation</strong></h2><p style=\"min-height:1.5em\">The base salary range for this role is USD $150,000 - $185,000 for candidates based in New York, spanning the mid to senior level and benchmarked to the middle of the market for comparable venture-backed companies. Where an offer lands in the range reflects level and the expertise and responsibilities determined through the interview process, based on applied experience and other criteria established by the hiring committee.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>The Hiring Journey</strong></p><h2><strong>Hiring Journey</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, our hiring process is designed to help you assess whether this role and our culture are the right fit based on your unique skills, mindset, and experiences. We move fast and work with intensity, so we want you to get a real sense of that from the start.</p><p style=\"min-height:1.5em\">Each journey includes a mix of interviews and a performance challenge. For this role, that might look like:</p><ol style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Online Application</p></li><li><p style=\"min-height:1.5em\">Initial Screen with Director of People &amp; Culture</p></li><li><p style=\"min-height:1.5em\">Interview with Hiring Manager</p></li><li><p style=\"min-height:1.5em\">Coding Challenge</p></li><li><p style=\"min-height:1.5em\">Design Challenge</p></li><li><p style=\"min-height:1.5em\">Final 1:1 Interviews</p></li><li><p style=\"min-height:1.5em\">Final Decision</p></li></ol><p style=\"min-height:1.5em\"><em>Generally, this entire process takes around 6 weeks, although the timing can vary due to specific candidate circumstances.</em></p><p style=\"min-height:1.5em\"></p><h2><strong>Ready to shape the future of work?</strong></h2><p style=\"min-height:1.5em\">At FutureFit AI, we're not just building a company—we're transforming how talent and opportunity connect. Join our driven team united by a commitment to job seekers and the workforce ecosystems we serve.</p><p style=\"min-height:1.5em\"></p><h2><strong>Company Snapshot:</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Team: </strong>30-50 across US and Canada (hubs in NYC and Toronto)</p></li><li><p style=\"min-height:1.5em\"><strong>Customers: </strong>Workforce development agencies and intermediaries, government agencies, employers</p></li><li><p style=\"min-height:1.5em\"><strong>Industry:</strong> SaaS/AI technology</p></li><li><p style=\"min-height:1.5em\"><strong>Funding:</strong> Bootstrapped 0-1, then raised funding led by JP Morgan</p></li><li><p style=\"min-height:1.5em\"><strong>Structure: </strong>Growth, Customer Success, Product, Engineering, Data, People &amp; Culture, Finance &amp; Operations</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Our Core Principles</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Be Curious</p></li><li><p style=\"min-height:1.5em\">Drive to Outcomes</p></li><li><p style=\"min-height:1.5em\">Raise the Bar</p></li><li><p style=\"min-height:1.5em\">Speed Matters</p></li><li><p style=\"min-height:1.5em\">Own It</p></li><li><p style=\"min-height:1.5em\">We Over Me</p></li></ul><p style=\"min-height:1.5em\"></p><h2><strong>Use of AI in Hiring</strong></h2><p style=\"min-height:1.5em\">At FutureFit, we use artificial intelligence (AI) tools to make our hiring process more efficient, consistent, and equitable—never to replace human judgment. We use AI in the following ways:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>Screening support:</strong> AI may help us compare applications against the skills and experience required for a specific role. These skills are defined by the hiring team for each position. A human reviews each application, with the AI assessment as just one input. </p></li><li><p style=\"min-height:1.5em\"><strong>Interview support:</strong> In some interviews, we may use an AI notetaker to summarize the discussion so interviewers can focus on being present in the conversation.</p></li><li><p style=\"min-height:1.5em\"><strong>Insights, not decisions:</strong> AI provides data points to support our team’s evaluation but does not make or recommend final hiring decisions. Every hiring decision is made by people.</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>We will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive other benefits and privileges of employment. Please contact us to request an accommodation.</em><br /><br /><em><strong>© </strong>FutureFit AI All rights reserved, we are proud to be an equal opportunity workplace. We celebrate diversity and are committed to creating an inclusive environment for all employees. We do not discriminate on the basis of race, religion, color, gender identity, sexual orientation, age, disability, veteran status, or other applicable legally protected characteristics. We encourage people of different backgrounds, experiences, abilities, and perspectives to apply.</em></p>","directApply":true,"identifier":{"@type":"PropertyValue","name":"FutureFit AI","value":"df12191c-3c81-4750-9a17-4e6f94181599"},"datePosted":"2026-06-09","hiringOrganization":{"@type":"Organization","name":"FutureFit AI","sameAs":"https://www.futurefit.ai/","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/82aa54ac-fee0-4012-8043-b3a97a387c09/efb01fd6-cfcf-474e-a1e8-1e8656f09721/c041b70f-4694-4f92-a6f2-60673934d837.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress"}},"employmentType":"FULL_TIME"},"publishedDate":"2026-06-09","applicationDeadline":null,"structuredMetadataOverride":null,"address":{"postalAddress":{}},"isRemote":null,"workplaceType":null,"employmentType":"FullTime","jobId":"235349a4-3edb-4499-aefe-661798fafd32","jobRequisitionId":null,"organizationId":"82aa54ac-fee0-4012-8043-b3a97a387c09","isConfidential":false,"compensationTierSu
