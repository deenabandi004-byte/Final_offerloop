[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not eval and not live"
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    live: Hits real external APIs (off by default; run explicitly with -m live)
    eval: LLM eval suite - burns OpenAI tokens. Off by default; run with -m eval
