name: Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 5'  # Every Friday at 9am UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai

      - name: Generate blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-blog-post.cjs

      - name: Commit and push
        run: |
          git config user.name "Offerloop Bot"
          git config user.email "bot@offerloop.ai"
          git add .
          git commit -m "Auto: weekly blog post"
          git push origin main
