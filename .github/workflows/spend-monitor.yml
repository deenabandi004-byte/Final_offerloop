name: Provider Spend Monitor

# Hits the backend's spend-check endpoint, which totals today + month-to-date
# provider spend (PDL / Hunter / OpenAI / Claude / Scout) and fires a Telegram
# alert on any newly-crossed budget threshold (50/80/100%). The budgets live in
# Render env (SPEND_DAILY_ALERT_USD / SPEND_MONTHLY_ALERT_USD); this job only
# triggers the check on a schedule.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  spend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger spend check
        env:
          SPEND_CHECK_TOKEN: ${{ secrets.SPEND_CHECK_TOKEN }}
        run: |
          if [ -z "$SPEND_CHECK_TOKEN" ]; then
            echo "::error::SPEND_CHECK_TOKEN secret not set"; exit 1
          fi
          curl -fsS --retry 2 -X POST "https://offerloop.ai/api/admin/spend-check" \
            -H "X-Spend-Token: $SPEND_CHECK_TOKEN" \
            -H "Content-Type: application/json"
